services:
  # 1. NGINX API Gateway
  - type: web
    name: lorely-gateway
    env: docker
    dockerfilePath: ./backend/nginx.dockerfile
    context: ./backend
    plan: free
    port: 80

  # 2. USER SERVICE
  - type: pserv
    name: user-service
    env: docker
    dockerfilePath: ./dockerfile
    context: ./backend/user-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lorely-db
          property: connectionString

  # 3. STORY SERVICE
  - type: pserv
    name: story-service
    env: docker
    dockerfilePath: ./dockerfile
    context: ./backend/story-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lorely-db
          property: connectionString

  # 4. CATALOG SERVICE
  - type: pserv
    name: catalog-service
    env: docker
    dockerfilePath: ./dockerfile
    context: ./backend/catalog-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lorely-db
          property: connectionString

  # 5. STORAGE SERVICE
  - type: pserv
    name: storage-service
    env: docker
    dockerfilePath: ./dockerfile
    context: ./backend/storage-service
    plan: free

# Automatyczne utworzenie darmowej bazy danych Postgres na Renderze
databases:
  - name: lorely-db
    plan: free
    databaseName: lorely
    user: vadosmik