worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 20M;

        # --- STORAGE-SERVICE --- 
        location /storage/ {
            include cors.conf;
        
            proxy_pass http://storage-service:8000/storage/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- STORY-SERVICE ---
        location /stories/ {
            include cors.conf;
        
            proxy_pass http://story-service:8000/stories/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /categories/ {
            include cors.conf;
        
            proxy_pass http://story-service:8000/categories/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /genre/ {
            include cors.conf;
        
            proxy_pass http://story-service:8000/genre/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- CATALOG-SERVICE ---
        location /catalog/ {
            include cors.conf;
        
            proxy_pass http://catalog-service:8000/catalog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- USER-SERVICE ---
        location /auth/ {
            include cors.conf;
        
            proxy_pass http://user-service:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /users/ {
            include cors.conf;
        
            proxy_pass http://user-service:8000/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /roles/ {
            include cors.conf;
        
            proxy_pass http://user-service:8000/roles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin/ {
            include cors.conf;
        
            proxy_pass http://user-service:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}