services:
  nginx:
    image: nginx:latest
    container_name: lorely-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cors.conf:/etc/nginx/cors.conf:ro
    ports:
      - "80:80"
    networks:
      - lorely-net
    depends_on:
      - user-service
      - story-service
      - storage-service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - '8000:8000'
    env_file:
      - .env
      - ./user-service/.env
    networks:
      - lorely-net
    depends_on:
      db:
        condition: service_healthy
  
  story-service:
    build: ./story-service
    container_name: story-service
    env_file:
      - .env
      - ./story-service/.env
    networks:
      - lorely-net
    depends_on:
      db:
        condition: service_healthy
  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    env_file:
      - .env
      - ./catalog-service/.env
    networks:
      - lorely-net
    depends_on:
      db:
        condition: service_healthy
  storage-service:
    build: ./storage-service
    container_name: storage-service
    env_file:
      - .env
      - ./storage-service/.env
    networks:
      - lorely-net
    depends_on:
      minio:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: lorely-postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - lorely-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1s
      timeout: 1s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin123
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - lorely-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 1s
      retries: 3

networks:
  lorely-net:
    driver: bridge

volumes:
  db-data:
  minio_data: