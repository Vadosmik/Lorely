services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - '8000:8000'
    env_file:
      - .env
      - ./user-service/.env
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
  
  story-service:
    build: ./story-service
    container_name: story-service
    ports:
      - '8001:8000'
    env_file:
      - .env
      - ./story-service/.env
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: lorely-postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1s
      timeout: 1s
      retries: 5

networks:
  app-net:
    driver: bridge

volumes:
  db-data: