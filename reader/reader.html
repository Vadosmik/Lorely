<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorely | Story Reader</title>
  <link rel="stylesheet" href="style.css">
  <script src="reader.js" defer></script>
  <script src="setting.js" defer></script>
  <script src="color-theme.js" defer></script>
</head>

<body>

  <main id="lorely-reader">
    <header class="story-header">
      <h1 id="story-title">Loading Story...</h1>
      <button id="color-theme" aria-label="Zmień motyw">
        <svg class="theme-icon moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-icon sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </header>

    <article id="story-content">
    </article>

    <section id="choices-container">
    </section>

    <footer class="reader-footer">
      <button onclick="resetStory()">reset story</button>
      <button onclick="openSetting()">setting</button>
      <!-- <small id="progress-indicator">Progress: 0%</small> -->
    </footer>
  </main>

  <div id="myMenu" hidden>
    <div id="myMenuContent" class="menu">
      <h2>Menu</h2>
      <hr>
      <div>
        <p>textSize: </p>
        <p id="text-size-value" style="font-weight: bold;">19px</p>
      </div>
      <div>
        <button id="decText">-</button>
        <input type="range" min="12" max="42" value="19" id="textSize">
        <button id="incText">+</button>
      </div>
      <hr>
    </div>
    <div id="overlay" class="menu-overlay" onclick="openSetting()"></div>
  </div>

</body>

</html>
